<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#E0C04A"/>
      <stop offset="100%" style="stop-color:#C9A227"/>
    </linearGradient>
  </defs>
  
  <!-- LOGO MARK -->
  <g transform="translate(8,5) scale(1.05)">
    <!-- Outer shape: top pointed like house/arrow, hexagonal bottom -->
    <!-- Main body: a big A-shaped structure with hexagon cutout -->
    
    <!-- Top triangle / roof -->
    <path d="M50,0 L85,20 L85,32 L75,32 L75,25 L50,10 L25,25 L25,32 L15,32 L15,20 Z" fill="url(#gold)"/>
    
    <!-- Left pillar -->
    <path d="M15,32 L25,32 L25,75 L35,82 L35,95 L25,95 L15,88 L15,32 Z" fill="url(#gold)"/>
    
    <!-- Right pillar -->
    <path d="M75,32 L85,32 L85,88 L75,95 L65,95 L65,82 L75,75 Z" fill="url(#gold)"/>
    
    <!-- Cross bar (connects the two pillars like letter A) -->
    <path d="M25,55 L35,55 L35,65 L25,65 Z" fill="url(#gold)"/>
    <path d="M65,55 L75,55 L75,65 L65,65 Z" fill="url(#gold)"/>
    
    <!-- Inner hexagon (the hole in the A) -->
    <polygon points="50,40 65,48 65,62 50,70 35,62 35,48" fill="url(#gold)" stroke="url(#gold)" stroke-width="1"/>
    <!-- Hexagon hole/cutout -->
    <polygon points="50,46 60,51 60,61 50,66 40,61 40,51" fill="#1A1A1A"/>
  </g>

  <!-- Separator line -->
  <line x1="120" y1="18" x2="120" y2="102" stroke="#D4AF37" stroke-width="1.5" opacity="0.4"/>

  <!-- Text: AURIS -->
  <text x="135" y="52" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF" letter-spacing="2">AURIS</text>
  <!-- Text: ARCHITECTURE -->
  <text x="135" y="76" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500" fill="#888888" letter-spacing="1.5">ARCHITECTURE</text>
  <!-- Text: & INTERIOR -->
  <text x="135" y="96" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500" fill="#888888" letter-spacing="1.5">&amp; INTERIOR</text>
</svg>
