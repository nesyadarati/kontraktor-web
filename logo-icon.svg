<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110">
  <defs>
    <linearGradient id="goldIcon" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#E0C04A"/>
      <stop offset="100%" style="stop-color:#C9A227"/>
    </linearGradient>
  </defs>
  
  <!-- Outer shape: pointed top (house/A roof) with hexagonal structure -->
  <!-- Top roof/arrow -->
  <path d="M50,0 L90,22 L90,36 L78,36 L78,28 L50,12 L22,28 L22,36 L10,36 L10,22 Z" fill="url(#goldIcon)"/>
  
  <!-- Left pillar -->
  <path d="M10,36 L22,36 L22,80 L34,88 L34,105 L22,105 L10,96 L10,36 Z" fill="url(#goldIcon)"/>
  
  <!-- Right pillar -->
  <path d="M78,36 L90,36 L90,96 L78,105 L66,105 L66,88 L78,80 Z" fill="url(#goldIcon)"/>
  
  <!-- Hexagon border (middle connection + creates the A crossbar) -->
  <polygon points="50,42 66,52 66,68 50,78 34,68 34,52" fill="url(#goldIcon)"/>
  <!-- Hexagon inner cutout -->
  <polygon points="50,50 60,56 60,64 50,70 40,64 40,56" fill="#1A1A1A"/>
</svg>
